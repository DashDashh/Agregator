version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: aggregator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # данные живут между перезапусками
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aggregator" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kafka + Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Создание топиков при старте 
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - kafka
    environment:
      KAFKA_PROTOCOL_VERSION: v1
      KAFKA_SYSTEM_NAME: aggregator_insurer
      KAFKA_INSTANCE_ID: local
    entrypoint: >
      bash -c "
        echo 'Waiting for Kafka...';
        sleep 10;
        TOPIC_PREFIX=$${KAFKA_PROTOCOL_VERSION}.$${KAFKA_SYSTEM_NAME}.$${KAFKA_INSTANCE_ID};
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${TOPIC_PREFIX}.aggregator.requests;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${TOPIC_PREFIX}.aggregator.responses;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${TOPIC_PREFIX}.operator.requests;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${TOPIC_PREFIX}.operator.responses;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic $${TOPIC_PREFIX}.aggregator.dead_letter;
        echo 'Topics created.';
      "

  # Сервис агрегатора
  aggregator:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_PROTOCOL_VERSION: v1
      KAFKA_SYSTEM_NAME: aggregator_insurer
      KAFKA_INSTANCE_ID: local
      DATABASE_URL: postgres://aggregator:secret@postgres:5432/aggregator?sslmode=disable
      MIGRATIONS_PATH: /migrations/001_init.sql
      OPERATOR_TRANSPORT: ${OPERATOR_TRANSPORT:-kafka}
      MQTT_BROKER: mqtt:1883
      MQTT_CLIENT_ID: aggregator_insurer-local-mqtt
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MQTT_OPERATOR_TOPIC: v1.aggregator_insurer.local.operator.requests
      MQTT_OPERATOR_RESPONSE_TOPIC: v1.aggregator_insurer.local.operator.responses
      MQTT_QOS: 1
    restart: on-failure

  # MQTT брокер (легковесный)
  mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:Z
    ports:
      - "1883:1883"
    healthcheck:
      test: [ "CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ok" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
