services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: aggregator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - drones_net

  aggregator:
    build:
      context: .
      args:
        SERVICE_PATH: ./src/gateway
    profiles: ["kafka"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKER: kafka:29092
      BROKER_USER: ${BROKER_USER:-${ADMIN_USER:-admin}}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin_secret_123}}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      COMPONENT_DISPATCH_MODE: ${COMPONENT_DISPATCH_MODE:-inprocess}
      AUTH_SECRET: ${AUTH_SECRET:-dev_change_me_please_32_chars_min}
      DATABASE_URL: postgres://aggregator:secret@postgres:5432/aggregator?sslmode=disable
      MIGRATIONS_PATH: /migrations/001_init.sql
    restart: on-failure
    networks:
      - drones_net

  registry:
    build:
      context: .
      args:
        SERVICE_PATH: ./cmd/registry
    profiles: ["microservices"]
    environment:
      KAFKA_BROKER: kafka:29092
      BROKER_USER: ${BROKER_USER:-${ADMIN_USER:-admin}}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin_secret_123}}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      COMPONENT_DISPATCH_MODE: broker
    restart: on-failure
    networks:
      - drones_net

  orders:
    build:
      context: .
      args:
        SERVICE_PATH: ./cmd/orders
    profiles: ["microservices"]
    environment:
      KAFKA_BROKER: kafka:29092
      BROKER_USER: ${BROKER_USER:-${ADMIN_USER:-admin}}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin_secret_123}}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      COMPONENT_DISPATCH_MODE: broker
    restart: on-failure
    networks:
      - drones_net

  contracts:
    build:
      context: .
      args:
        SERVICE_PATH: ./cmd/contracts
    profiles: ["microservices"]
    environment:
      KAFKA_BROKER: kafka:29092
      BROKER_USER: ${BROKER_USER:-${ADMIN_USER:-admin}}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin_secret_123}}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      COMPONENT_DISPATCH_MODE: broker
    restart: on-failure
    networks:
      - drones_net

  analytics:
    build:
      context: .
      args:
        SERVICE_PATH: ./cmd/analytics
    profiles: ["microservices"]
    environment:
      KAFKA_BROKER: kafka:29092
      BROKER_USER: ${BROKER_USER:-${ADMIN_USER:-admin}}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin_secret_123}}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      COMPONENT_DISPATCH_MODE: broker
    restart: on-failure
    networks:
      - drones_net

volumes:
  postgres_data:

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
