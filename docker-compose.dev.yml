services:
  aggregator:
    environment:
      KAFKA_BROKER: kafka:9092
      BROKER_USER: ${BROKER_USER:-}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}

  registry:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:9092
      BROKER_USER: ${BROKER_USER:-}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}

  orders:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:9092
      BROKER_USER: ${BROKER_USER:-}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}

  contracts:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:9092
      BROKER_USER: ${BROKER_USER:-}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}

  analytics:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:9092
      BROKER_USER: ${BROKER_USER:-}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - drones_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    restart: on-failure
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      drones_net:
        aliases:
          - kafka

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - kafka
    environment:
      SYSTEM_NAMESPACE: ${SYSTEM_NAMESPACE:-}
      SYSTEM_NAME: agregator
    entrypoint: >
      bash -c "
        set -e;
        echo 'Waiting for Kafka...';
        for i in $$(seq 1 60); do
          if kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; then
            break;
          fi;
          echo \"Kafka is not ready yet ($$i/60)\";
          sleep 2;
        done;
        kafka-topics --bootstrap-server kafka:9092 --list >/dev/null;
        NS="$${SYSTEM_NAMESPACE}";
        NS="$${NS#.}";
        NS="$${NS%.}";
        PREFIX='';
        if [ -n \"$${NS}\" ]; then PREFIX=\"$${NS}.\"; fi;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${PREFIX}systems.$${SYSTEM_NAME};
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${PREFIX}components.$${SYSTEM_NAME}.responses;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic components.$${SYSTEM_NAME}.registry;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic components.$${SYSTEM_NAME}.orders;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic components.$${SYSTEM_NAME}.contracts;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic components.$${SYSTEM_NAME}.analytics;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${PREFIX}components.$${SYSTEM_NAME}.operator.requests;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic $${PREFIX}components.$${SYSTEM_NAME}.operator.responses;
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic errors.dead_letters;
        echo 'Topics created.';
      "
    networks:
      - drones_net

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
